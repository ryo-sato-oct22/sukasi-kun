<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Sukasi-kun - ウォーターマーク設定</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="4" stroke="currentColor" stroke-width="2"/>
          <path d="M7 17L17 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M7 12L12 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 17L17 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div class="logo-text">
          <h1>Sukasi-kun</h1>
          <p>Environment Watermark</p>
        </div>
      </div>
    </header>

    <main class="app-body">
      <!-- Live Preview Card -->
      <section class="card preview-card">
        <h2 class="section-title">プレビュー (Preview)</h2>
        <div class="preview-area" id="previewArea">
          <div class="preview-bg-grid"></div>
          <div class="watermark-preview" id="watermarkPreview">DEV</div>
        </div>
      </section>

      <!-- Settings Form -->
      <section class="card form-card">
        <h2 class="section-title">新しいルールを追加 (Add Rule)</h2>
        <form id="ruleForm">
          <div class="form-group">
            <label for="domain">対象ドメイン (Domain)</label>
            <input type="text" id="domain" placeholder="example.com や localhost:3000" required>
            <span class="help-text">部分一致で判定されます（例: 「localhost」は「localhost:3000」にもマッチします）</span>
          </div>

          <div class="form-group">
            <label for="text">表示テキスト (Text)</label>
            <input type="text" id="text" placeholder="DEVELOPMENT" value="DEVELOPMENT" required>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="fontSize">文字サイズ (Font Size)</label>
              <div class="range-container">
                <input type="range" id="fontSize" min="10" max="60" value="20">
                <span class="range-val" id="fontSizeVal">20px</span>
              </div>
            </div>

            <div class="form-group">
              <label for="textOpacity">不透明度 (Opacity)</label>
              <div class="range-container">
                <input type="range" id="textOpacity" min="10" max="100" value="70">
                <span class="range-val" id="textOpacityVal">70%</span>
              </div>
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="textColor">文字色 (Color)</label>
              <div class="color-picker-wrapper">
                <input type="color" id="textColor" value="#ffffff">
                <span class="color-code" id="textColorCode">#ffffff</span>
              </div>
            </div>

            <div class="form-group">
              <label for="bgColor">背景色 (Background)</label>
              <div class="color-picker-wrapper">
                <input type="color" id="bgColor" value="#ff3366">
                <span class="color-code" id="bgColorCode">#ff3366</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>表示位置 (Position)</label>
            <div class="position-grid">
              <button type="button" class="pos-btn" data-x="left" data-y="top" title="左上">
                <div class="pos-dot top left"></div>
                左上
              </button>
              <button type="button" class="pos-btn active" data-x="right" data-y="top" title="右上">
                <div class="pos-dot top right"></div>
                右上
              </button>
              <button type="button" class="pos-btn" data-x="left" data-y="bottom" title="左下">
                <div class="pos-dot bottom left"></div>
                左下
              </button>
              <button type="button" class="pos-btn" data-x="right" data-y="bottom" title="右下">
                <div class="pos-dot bottom right"></div>
                右下
              </button>
            </div>
          </div>

          <button type="submit" class="btn btn-primary" id="saveBtn">ルールを保存</button>
        </form>
      </section>

      <!-- Rules List -->
      <section class="card list-card">
        <div class="list-header">
          <h2 class="section-title">登録済みルール一覧 (Configured Rules)</h2>
          <span class="badge" id="ruleCount">0</span>
        </div>
        <div class="rules-list" id="rulesList">
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p>登録されたルールはありません。<br>上のフォームから登録してください。</p>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
